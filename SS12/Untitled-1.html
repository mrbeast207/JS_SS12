<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Manager</title>
</head>

<body>
<script>

let students = [
 {id:"S01",name:"Nguyen Van A",age:19,gpa:8.9,status:"active"},
 {id:"S02",name:"Tran Thi B",age:18,gpa:7.5,status:"active"},
 {id:"S03",name:"Le Van C",age:21,gpa:6.2,status:"active"},
 {id:"S04",name:"Pham Thi D",age:20,gpa:5.5,status:"inactive"},
 {id:"S05",name:"Hoang Van E",age:22,gpa:2.8,status:"active"}
]

function showAll(){
 console.table(students)
}

function createStudent(){

 let id = prompt("Nhap id")
 for(let s of students){
  if(s.id===id){
   alert("id da ton tai")
   return
  }
 }

 let name = prompt("Nhap ten")
 let age = Number(prompt("Nhap tuoi"))
 let gpa = Number(prompt("Nhap gpa"))
 let status = prompt("Nhap status active/inactive")

 if(!name || age<16 || age>60 || gpa<0 || gpa>10){
  alert("du lieu khong hop le")
  return
 }

 students.push({
  id:id,
  name:name,
  age:age,
  gpa:gpa,
  status:status
 })

 alert("Them thanh cong")
}

function updateStudent(){

 let id = prompt("Nhap id can sua")
 let found = false

 for(let s of students){
  if(s.id===id){
   found=true

   let name = prompt("Ten moi")
   let age = prompt("Tuoi moi")
   let gpa = prompt("Gpa moi")
   let status = prompt("Status moi")

   if(name) s.name=name
   if(age) s.age=Number(age)
   if(gpa) s.gpa=Number(gpa)
   if(status) s.status=status

   alert("Cap nhat thanh cong")
  }
 }

 if(!found){
  alert("Khong tim thay")
 }
}

function deleteStudent(){

 let id = prompt("Nhap id can xoa")

 for(let s of students){
  if(s.id===id){
   if(confirm("Ban chac chan muon xoa?")){
    s.status="inactive"
    alert("Da xoa")
   }
   return
  }
 }

 alert("Khong tim thay")
}

function restoreStudent(){

 let id = prompt("Nhap id can restore")

 for(let s of students){
  if(s.id===id){
   s.status="active"
   alert("Restore thanh cong")
   return
  }
 }

 alert("Khong tim thay")
}

function viewStudents(){

 let keyword = prompt("Nhap ten muon tim") || ""
 let list = students.filter(s=>s.name.toLowerCase().includes(keyword.toLowerCase()))

 let sort = prompt("sap xep gpa asc/desc")

 if(sort==="asc"){
  list.sort((a,b)=>a.gpa-b.gpa)
 }else if(sort==="desc"){
  list.sort((a,b)=>b.gpa-a.gpa)
 }

 console.table(list)
}

function analytics(){

 let total = students.length
 let active = students.filter(s=>s.status==="active").length
 let inactive = students.filter(s=>s.status==="inactive").length

 let sum = 0
 for(let s of students){
  sum += s.gpa
 }

 let avg = sum/total

 console.log("Tong:",total)
 console.log("Active:",active)
 console.log("Inactive:",inactive)
 console.log("GPA trung binh:",avg.toFixed(2))

 let top = [...students].sort((a,b)=>b.gpa-a.gpa).slice(0,5)
 console.table(top)
}

function menu(){

 let choice

 do{

 choice = prompt(
`1. Them sinh vien
2. Cap nhat
3. Soft delete
4. Restore
5. Xem danh sach
6. Thong ke
7. Hien tat ca
0. Thoat`
 )

 switch(choice){
  case "1": createStudent(); break
  case "2": updateStudent(); break
  case "3": deleteStudent(); break
  case "4": restoreStudent(); break
  case "5": viewStudents(); break
  case "6": analytics(); break
  case "7": showAll(); break
 }

 }while(choice!="0")

}

menu()

</script>
</body>
</html>
